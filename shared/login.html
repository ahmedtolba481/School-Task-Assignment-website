<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
<br><br><br><br>
<h1 align="center">Login</h1>
<form>
<table align="center" cellpadding="10">
<tr>
<td><label for="email">Email</label></td>
<td><input type="email" id="email"  placeholder="Enter your email" required></td>
</tr>

<tr>
<td><label for="password">Password</label></td>
<td><input type="password" id="password"  placeholder="Enter your password" required minlength="6"></td>
</tr>
<tr>
<td><label for="role">Role</label></td>
<td>
<select id="role" required>
<option value="">Select your role</option>
<option value="teacher">Teacher</option>
<option value="admin">Admin</option>
</select>
</td>
</tr>
<tr>
<td colspan="2" >
<input type="checkbox" id="c"> <label for="c">Remember me</label>
</td>
</tr>

<tr>
<td colspan="2" align="center">
<input type="submit" value="Login">
</td>
</tr>

<tr>
<td colspan="2" align="center">
<a href="forgot-password.html">Forgot Password</a>
</td>
</tr>

<tr>
<td colspan="2" align="center">
Don't have an account? <a href="signup.html">Sign Up</a>
</td>
</tr>

</table>

</form>

</body>
</html>
